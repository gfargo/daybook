name: Rebuild site on wiki update

on:
  gollum:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy hook secret
        id: check-secret
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn if deploy hook is not configured
        if: steps.check-secret.outputs.configured == 'false'
        run: |
          echo "::warning::VERCEL_DEPLOY_HOOK secret is not configured. Skipping deploy trigger."
          echo "To enable automatic deploys on wiki updates, add a VERCEL_DEPLOY_HOOK repository secret."

      - name: Trigger Vercel deploy
        if: steps.check-secret.outputs.configured == 'true'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel deploy hook triggered successfully."
